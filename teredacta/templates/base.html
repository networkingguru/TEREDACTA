<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TEREDACTA{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Browse 5,600+ recovered redactions from 1.4 million government documents in the Congressional Epstein/Maxwell releases.{% endblock %}">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <!-- Open Graph -->
    <meta property="og:title" content="{% block og_title %}TEREDACTA — Recovered Government Redactions{% endblock %}">
    <meta property="og:description" content="{% block og_description %}5,600+ redacted passages recovered from 1.4 million Congressional Epstein/Maxwell documents by cross-referencing inconsistent redaction patterns.{% endblock %}">
    <meta property="og:image" content="{% block og_image %}https://teredacta.counting-to-infinity.com/static/img/og-card.jpg{% endblock %}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://teredacta.counting-to-infinity.com{{ request.url.path }}">
    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}TEREDACTA — Recovered Government Redactions{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}5,600+ redacted passages recovered from 1.4M Congressional Epstein/Maxwell documents.{% endblock %}">
    <meta name="twitter:image" content="https://teredacta.counting-to-infinity.com/static/img/og-card.jpg">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/img/favicon.png">
    <link rel="stylesheet" href="/static/css/app.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body hx-headers='{"X-CSRF-Token": "{{ csrf_token }}"}'>
    <nav class="top-nav">
        <div class="nav-left">
            <a href="/" class="nav-logo"><img src="/static/img/logo.png" alt="TEREDACTA" class="nav-logo-img"></a>
            <a href="/" class="nav-link {% block nav_explore %}{% endblock %}">Explore</a>
            <a href="/highlights" class="nav-link {% block nav_highlights %}{% endblock %}">Highlights</a>
            <a href="/recoveries" class="nav-link {% block nav_recoveries %}{% endblock %}">Recoveries</a>
            <a href="/documents" class="nav-link {% block nav_documents %}{% endblock %}">Documents</a>
            <a href="/summary" class="nav-link {% block nav_summary %}{% endblock %}">Summary</a>
            {% if is_admin %}
            <a href="/admin" class="nav-link {% block nav_admin %}{% endblock %}" title="Pipeline administration">Admin</a>
            {% endif %}
        </div>
        <div class="nav-right">
            {% if is_admin is defined and is_admin %}
            <span id="daemon-status" hx-get="/sse/daemon-status" hx-trigger="load, every 5s" hx-swap="innerHTML">
                <span class="status-dot stopped"></span> CHECKING...
            </span>
            {% endif %}
        </div>
    </nav>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
