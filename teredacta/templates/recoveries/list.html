{% extends "base.html" %}
{% block title %}Recoveries — TEREDACTA{% endblock %}
{% block nav_recoveries %}active{% endblock %}
{% block content %}
<h1>Recoveries <span style="color: var(--text-secondary); font-size: 1rem;">({{ total }})</span></h1>

<div class="search-bar">
    <input type="text" class="search-input" name="search" value="{{ search }}"
           placeholder="Search recovered text..."
           hx-get="/recoveries/" hx-target="#recovery-table" hx-trigger="keyup changed delay:300ms"
           hx-include="[name='sort']">
    <select name="sort" class="filter-select" hx-get="/recoveries/" hx-target="#recovery-table" hx-trigger="change"
            hx-include="[name='search']">
        <option value="">Sort by count</option>
        <option value="date" {% if sort == 'date' %}selected{% endif %}>Sort by date</option>
    </select>
</div>
<p class="search-hint">Search recovered text — use AND, OR, quotes for exact phrases</p>

<div id="recovery-table">
{% include "recoveries/table.html" %}
</div>
{% endblock %}
