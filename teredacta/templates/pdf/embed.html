<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #525659; }
#viewerContainer { width: 100%; height: 100%; overflow: auto; display: flex; flex-direction: column; align-items: center; }
canvas { display: block; margin: 4px auto; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
#loading { color: #ccc; padding: 2rem; text-align: center; font-family: sans-serif; }
#error { color: #fff; padding: 2rem; text-align: center; font-family: sans-serif; display: none; }
</style>
</head>
<body>
<div id="viewerContainer" data-pdf-url="{{ pdf_url }}"><div id="loading">Loading PDF...</div></div>
<div id="error">Failed to load PDF.</div>
<script type="module" src="/static/js/pdf-embed.js"></script>
</body>
</html>
