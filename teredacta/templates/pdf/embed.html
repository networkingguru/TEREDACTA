<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #525659; }
#viewerContainer { width: 100%; height: 100%; overflow: auto; display: flex; flex-direction: column; align-items: center; }
canvas { display: block; margin: 4px auto; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
#loading { color: #ccc; padding: 2rem; text-align: center; font-family: sans-serif; }
#error { color: #fff; padding: 2rem; text-align: center; font-family: sans-serif; display: none; }
</style>
</head>
<body>
<div id="viewerContainer"><div id="loading">Loading PDF...</div></div>
<div id="error">Failed to load PDF.</div>
<script type="module">
import * as pdfjsLib from '/static/js/pdfjs/pdf.min.mjs';
pdfjsLib.GlobalWorkerOptions.workerSrc = '/static/js/pdfjs/pdf.worker.min.mjs';

const container = document.getElementById('viewerContainer');
const errorEl = document.getElementById('error');
const pdfUrl = {{ pdf_url|tojson }};
let pdfDoc = null;

async function renderPDF() {
    container.innerHTML = '';
    try {
        if (!pdfDoc) {
            pdfDoc = await pdfjsLib.getDocument(pdfUrl).promise;
        }
        const containerWidth = container.clientWidth;

        for (let i = 1; i <= pdfDoc.numPages; i++) {
            const page = await pdfDoc.getPage(i);
            const baseViewport = page.getViewport({ scale: 1 });
            const scale = (containerWidth - 16) / baseViewport.width;
            const viewport = page.getViewport({ scale });

            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            container.appendChild(canvas);

            await page.render({
                canvasContext: canvas.getContext('2d'),
                viewport: viewport,
            }).promise;
        }
    } catch (e) {
        console.error('PDF render error:', e);
        errorEl.style.display = 'block';
    }
}

let resizeTimer;
window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(renderPDF, 300);
});

renderPDF();
</script>
</body>
</html>
