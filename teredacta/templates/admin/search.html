{% extends "base.html" %}
{% block title %}Search — TEREDACTA{% endblock %}
{% block content %}
<h1>Search</h1>
<div class="admin-form" style="max-width:600px;">
    <form hx-post="/admin/search" hx-target="#search-result">
        <div class="form-group"><label>Person Name</label><input name="person" class="form-control" placeholder="e.g. Epstein"></div>
        <div class="form-group"><label>Batch ID</label><input name="batch" class="form-control" placeholder="e.g. VOL00001"></div>
        <div class="form-group"><label>Document ID</label><input name="doc_id" class="form-control"></div>
        <div class="form-group"><label>Free Text Query</label><input name="query" class="form-control"></div>
        <button type="submit" class="btn btn-primary">Search</button>
    </form>
    <div id="search-result" style="margin-top:1rem;">
        {% if result %}
        <strong>{{ 'Success' if result.success else 'Failed' }}</strong>
        <pre>{{ result.get('stdout', '') or result.get('error', '') }}</pre>
        {% endif %}
    </div>
</div>
{% endblock %}
